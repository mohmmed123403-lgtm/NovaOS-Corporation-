<div class="modal-content">
    <span class="close-btn" onclick="closePayment()">&times;</span>
    <h2 style="color: #38bdf8;">تفعيل التحميل الفوري</h2>
    <p>بمجرد اختيار الوسيلة وتحويل المبلغ، سيبدأ السحب فوراً:</p>
    
    <div class="payment-option" onclick="startAutoDownload('فودافون كاش: 01002023793')">
        📱 الدفع عبر فودافون كاش
    </div>
    
    <div class="payment-option" onclick="startAutoDownload('إنستا باي: 01002023793')">
        💳 الدفع عبر إنستا باي
    </div>

    <div id="statusMsg" style="margin-top:20px; color:#fbbf24; font-weight:bold;"></div>
</div>

<script>
    function startAutoDownload(msg) {
        alert(msg + "\n\nبرجاء التحويل الآن.. سيبدأ التحميل تلقائياً خلال ثواني.");
        
        const status = document.getElementById('statusMsg');
        status.innerHTML = "⌛ جاري تجهيز رابط السحب الخاص بك...";

        // حركة "ذكية": بنستنى 5 ثواني كأن الموقع بيتأكد من الدفع وبعدين يحمل
        setTimeout(() => {
            status.innerHTML = "✅ تم التحقق! جاري بدء التحميل...";
            
            // كود السحب اللي بالاسم اللي اتفقنا عليه
            const fileName = "NovaOS-Pro.iso";
            const link = document.createElement('a');
            link.href = fileName;
            link.download = NovaOS Pro.iso;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }, 5000); // 5 ثواني انتظار
    }
</script>
