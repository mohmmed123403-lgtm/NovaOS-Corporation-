<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovaOS Corp - Official</title>
    <style>
        body {
            background-color: #0a0f14;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            border: 2px solid #00d2ff;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 0 20px #00d2ff;
            background: rgba(0, 0, 0, 0.5);
            max-width: 400px;
        }
        h1 {
            color: #00d2ff;
            font-size: 3rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 10px #00d2ff;
        }
        .dev-name {
            color: #ffd700;
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 20px;
        }
        p {
            font-size: 1.1rem;
            line-height: 1.6;
        }
        .os-box {
            background: #1a1a1a;
            border: 1px dashed #00d2ff;
            padding: 15px;
            margin: 20px 0;
            border-radius: 10px;
        }
        .btn {
            background: linear-gradient(45deg, #007bff, #00d2ff);
            color: white;
            padding: 15px 30px;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            display: inline-block;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(0, 210, 255, 0.4);
        }
        .btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 25px #00d2ff;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>NOVAOS</h1>
        <div class="dev-name">بصمة المطور العبقري: محمد</div>
        
        <p>مرحباً بكم في الموقع الرسمي لشركة <br> <strong>NovaOS Corporation</strong></p>
        
        <p style="font-style: italic; color: #ccc;">نحن لا نعدل الأنظمة.. نحن نعيد ابتكارها.</p>

        <div class="os-box">
            <h3>Win11 Turbo</h3>
            <p>✅ خفيفة جداً ✅ بدون TPM ✅ دعم MBR/GPT</p>
        </div>

        <a href="#" class="btn">تحميل النظام (نسخة الامتياز) 🚀</a>
    </div>

</body>
</html>
